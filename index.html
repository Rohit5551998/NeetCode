<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeetCode 150 + System Design Tracker</title>
<style>
  :root {
    --bg: #0f0f13;
    --surface: #1a1a24;
    --surface-hover: #22222f;
    --border: #2a2a3a;
    --text: #e4e4ed;
    --text-dim: #8888a0;
    --accent: #7c5cfc;
    --accent-glow: rgba(124, 92, 252, 0.15);
    --green: #34d399;
    --green-dim: rgba(52, 211, 153, 0.15);
    --orange: #fb923c;
    --orange-dim: rgba(251, 146, 60, 0.15);
    --red: #f87171;
    --red-dim: rgba(248, 113, 113, 0.15);
    --yellow: #fbbf24;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
  }

  .container {
    max-width: 960px;
    margin: 0 auto;
    padding: 32px 20px 80px;
  }

  .header {
    text-align: center;
    margin-bottom: 40px;
  }

  .header h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 6px;
  }

  .header h1 span { color: var(--accent); }

  .deadline {
    font-size: 14px;
    color: var(--text-dim);
  }

  .deadline strong {
    color: var(--orange);
    font-weight: 600;
  }

  .stats-bar {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    margin-bottom: 32px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    text-align: center;
  }

  .stat-card .value {
    font-size: 28px;
    font-weight: 700;
    line-height: 1.2;
  }

  .stat-card .label {
    font-size: 12px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-top: 4px;
  }

  .stat-card.total .value { color: var(--accent); }
  .stat-card.done .value { color: var(--green); }
  .stat-card.remaining .value { color: var(--orange); }
  .stat-card.pace .value { color: var(--yellow); font-size: 22px; }

  .overall-progress {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 32px;
  }

  .overall-progress .top-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 12px;
  }

  .overall-progress .top-row h2 {
    font-size: 16px;
    font-weight: 600;
  }

  .overall-progress .percentage {
    font-size: 24px;
    font-weight: 700;
    color: var(--accent);
  }

  .progress-track {
    width: 100%;
    height: 10px;
    background: var(--border);
    border-radius: 999px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), #a78bfa);
    border-radius: 999px;
    transition: width 0.4s ease;
  }

  .weekly-schedule {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 32px;
  }

  .weekly-schedule h2 {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 16px;
  }

  .week-row {
    display: grid;
    grid-template-columns: 60px 1fr 100px 60px;
    align-items: center;
    gap: 12px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }

  .week-row:last-child { border-bottom: none; }

  .week-row .wk {
    font-weight: 600;
    color: var(--accent);
  }

  .week-row .dates { color: var(--text-dim); }
  .week-row .sections { color: var(--text); }

  .week-row .wk-status {
    text-align: right;
    font-weight: 600;
    font-size: 12px;
  }

  .week-row.current {
    background: var(--accent-glow);
    border-radius: 8px;
    padding: 8px;
    margin: 0 -8px;
  }

  .wk-done { color: var(--green); }
  .wk-active { color: var(--orange); }
  .wk-pending { color: var(--text-dim); }

  .filter-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .filter-btn {
    padding: 6px 14px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .filter-btn:hover {
    border-color: var(--accent);
    color: var(--text);
  }

  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  .section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 16px;
    overflow: hidden;
  }

  .section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 20px;
    cursor: pointer;
    user-select: none;
    transition: background 0.2s;
  }

  .section-header:hover { background: var(--surface-hover); }

  .section-title {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-title .chevron {
    font-size: 12px;
    color: var(--text-dim);
    transition: transform 0.2s;
    display: inline-block;
  }

  .section.open .chevron { transform: rotate(90deg); }

  .section-title h3 {
    font-size: 15px;
    font-weight: 600;
  }

  .section-meta {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .section-count {
    font-size: 13px;
    color: var(--text-dim);
  }

  .section-count .done-count { color: var(--green); font-weight: 600; }

  .section-bar {
    width: 80px;
    height: 6px;
    background: var(--border);
    border-radius: 999px;
    overflow: hidden;
  }

  .section-bar-fill {
    height: 100%;
    background: var(--green);
    border-radius: 999px;
    transition: width 0.3s;
  }

  .problem-list {
    display: none;
    padding: 0 20px 16px;
  }

  .section.open .problem-list { display: block; }

  .problem-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
    border-top: 1px solid var(--border);
    font-size: 14px;
    transition: opacity 0.2s;
  }

  .problem-item.completed { opacity: 0.5; }
  .problem-item.completed .problem-name { text-decoration: line-through; }

  .problem-checkbox {
    appearance: none;
    width: 20px;
    height: 20px;
    min-width: 20px;
    border: 2px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    background: transparent;
  }

  .problem-checkbox:checked {
    background: var(--green);
    border-color: var(--green);
  }

  .problem-checkbox:checked::after {
    content: '\2713';
    color: #000;
    font-size: 13px;
    font-weight: 700;
  }

  .problem-name { flex: 1; cursor: pointer; }

  .problem-difficulty {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 999px;
    font-weight: 600;
  }

  .diff-easy { background: var(--green-dim); color: var(--green); }
  .diff-medium { background: var(--orange-dim); color: var(--orange); }
  .diff-hard { background: var(--red-dim); color: var(--red); }

  .notes-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .notes-btn:hover, .question-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .question-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .question-btn.has-content {
    border-color: var(--accent);
    color: var(--accent);
  }

  .notes-area, .question-area {
    display: none;
    width: 100%;
    margin-top: 8px;
    margin-bottom: 4px;
    padding: 8px 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 13px;
    font-family: inherit;
    resize: vertical;
    overflow: hidden;
  }

  .notes-area { min-height: 80px; }
  .question-area { min-height: 80px; }

  .notes-area.visible, .question-area.visible { display: block; }

  .reset-bar {
    text-align: center;
    margin-top: 40px;
  }

  .reset-btn {
    padding: 8px 20px;
    background: transparent;
    border: 1px solid var(--red);
    color: var(--red);
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .reset-btn:hover { background: var(--red-dim); }

  @media (max-width: 600px) {
    .stats-bar { grid-template-columns: repeat(2, 1fr); }
    .week-row { grid-template-columns: 50px 1fr 50px; }
    .week-row .dates { display: none; }
    .section-bar { display: none; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>NeetCode <span>150</span> + System Design</h1>
    <div class="deadline">Deadline: <strong>June 30, 2026</strong> · Started: March 22, 2026</div>
  </div>

  <div class="stats-bar">
    <div class="stat-card total"><div class="value" id="stat-total">172</div><div class="label">Total</div></div>
    <div class="stat-card done"><div class="value" id="stat-done">0</div><div class="label">Done</div></div>
    <div class="stat-card remaining"><div class="value" id="stat-remaining">172</div><div class="label">Remaining</div></div>
    <div class="stat-card pace"><div class="value" id="stat-pace">-</div><div class="label">Needed / Day</div></div>
  </div>

  <div class="overall-progress">
    <div class="top-row">
      <h2>Overall Progress</h2>
      <div class="percentage" id="overall-pct">0%</div>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="overall-fill" style="width:0%"></div>
    </div>
  </div>

  <div class="weekly-schedule" id="weekly-schedule"></div>

  <div class="filter-bar">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="pending">Pending</button>
    <button class="filter-btn" data-filter="completed">Completed</button>
    <button class="filter-btn" data-filter="easy">Easy</button>
    <button class="filter-btn" data-filter="medium">Medium</button>
    <button class="filter-btn" data-filter="hard">Hard</button>
  </div>

  <div id="sections-container"></div>

  <div class="reset-bar">
    <button class="reset-btn" id="reset-btn">Reset All Progress</button>
  </div>
</div>

<script>
const DATA = [
  {
    name: "Arrays & Hashing", week: 1, problems: [
      { name: "Contains Duplicate", d: "easy", q: "Given an integer array nums, return true if any value appears more than once in the array, otherwise return false.\n\nExample 1:\nInput: nums = [1, 2, 3, 3]\nOutput: true\n\nExample 2:\nInput: nums = [1, 2, 3, 4]\nOutput: false" , n: "#Brute Force:\n1. Use two nested loops — outer loop picks each element, inner loop compares it with every subsequent element\n2. If any pair matches (nums[i] == nums[j]), set resp = True and break\n3. Return resp\nTC -> O(n^2), SC -> O(1)\n\n#Better Approach:\n1. Initialize an empty hashmap (dict) to store element counts\n2. Loop through array, for each element increment its count in hashmap\n3. If count of any element exceeds 1, return True immediately (break early)\nTC -> O(n), SC -> O(n)\n\n#Optimal Approach:\n1. Initialize an empty hash set to track seen elements\n2. Loop through the array, for each element check if it already exists in the set\n3. If it exists, set resp = True and break (duplicate found)\n4. If not, add it to the set and continue\nTC -> O(n), SC -> O(n)\n\n#KEY INSIGHT:\n- A hash set gives O(1) lookup for existence checks — you only need to know if you've seen an element before, not how many times, making a set the ideal data structure over a counting hashmap", s: true},
      { name: "Valid Anagram", d: "easy", q: "Given two strings s and t, return true if the two strings are anagrams of each other, otherwise return false.\n\nAn anagram is a string that contains the exact same characters as another string, but the order of the characters can be different.\n\nExample 1:\nInput: s = \"racecar\", t = \"carrace\"\nOutput: true\n\nExample 2:\nInput: s = \"jar\", t = \"jam\"\nOutput: false\n\nConstraints:\ns and t consist of lowercase English letters." , n: "BRUTE FORCE:\n- Approach:\n- Time: O()\n- Space: O()\n\nBETTER:\n- Approach:\n- Time: O()\n- Space: O()\n\nOPTIMAL:\n- Approach:\n- Time: O()\n- Space: O()\n\nKEY INSIGHT:\n-"},
      { name: "Two Sum", d: "easy", q: "Given an array of integers nums and an integer target, return the indices i and j such that nums[i] + nums[j] == target and i != j.\n\nYou may assume that every input has exactly one pair of indices i and j that satisfy the condition.\n\nReturn the answer with the smaller index first.\n\nExample 1:\nInput: nums = [3,4,5,6], target = 7\nOutput: [0,1]\n\nExample 2:\nInput: nums = [4,5,6], target = 10\nOutput: [0,2]\n\nExample 3:\nInput: nums = [5,5], target = 10\nOutput: [0,1]\n\nConstraints:\n2 <= nums.length <= 1000\n-10,000,000 <= nums[i] <= 10,000,000\n-10,000,000 <= target <= 10,000,000\nOnly one valid answer exists." , n: "BRUTE FORCE:\n- Approach:\n- Time: O()\n- Space: O()\n\nBETTER:\n- Approach:\n- Time: O()\n- Space: O()\n\nOPTIMAL:\n- Approach:\n- Time: O()\n- Space: O()\n\nKEY INSIGHT:\n-"},
      { name: "Group Anagrams", d: "medium", q: "Given an array of strings strs, group all anagrams together into sublists. You may return the output in any order.\n\nAn anagram is a string that contains the exact same characters as another string, but the order of the characters can be different.\n\nExample 1:\nInput: strs = [\"act\",\"pots\",\"tops\",\"cat\",\"stop\",\"hat\"]\nOutput: [[\"hat\"],[\"act\", \"cat\"],[\"stop\", \"pots\", \"tops\"]]\n\nExample 2:\nInput: strs = [\"x\"]\nOutput: [[\"x\"]]\n\nExample 3:\nInput: strs = [\"\"]\nOutput: [[\"\"]]\n\nConstraints:\n1 <= strs.length <= 1000\n0 <= strs[i].length <= 100\nstrs[i] is made up of lowercase English letters." , n: "BRUTE FORCE:\n- Approach:\n- Time: O()\n- Space: O()\n\nBETTER:\n- Approach:\n- Time: O()\n- Space: O()\n\nOPTIMAL:\n- Approach:\n- Time: O()\n- Space: O()\n\nKEY INSIGHT:\n-"},
      { name: "Top K Frequent Elements", d: "medium", q: "Given an integer array nums and an integer k, return the k most frequent elements within the array.\n\nThe test cases are generated such that the answer is always unique.\n\nYou may return the output in any order.\n\nExample 1:\nInput: nums = [1,2,2,3,3,3], k = 2\nOutput: [2,3]\n\nExample 2:\nInput: nums = [7,7], k = 1\nOutput: [7]\n\nConstraints:\n1 <= nums.length <= 10^4\n-1000 <= nums[i] <= 1000\n1 <= k <= number of distinct elements in nums." , n: "BRUTE FORCE:\n- Approach:\n- Time: O()\n- Space: O()\n\nBETTER:\n- Approach:\n- Time: O()\n- Space: O()\n\nOPTIMAL:\n- Approach:\n- Time: O()\n- Space: O()\n\nKEY INSIGHT:\n-"},
      { name: "Encode and Decode Strings", d: "medium", q: "Design an algorithm to encode a list of strings to a single string. The encoded string is then decoded back to the original list of strings.\n\nImplement encode and decode.\n\nExample 1:\nInput: [\"Hello\",\"World\"]\nOutput: [\"Hello\",\"World\"]\n\nExample 2:\nInput: [\"\"]\nOutput: [\"\"]\n\nConstraints:\n0 <= strs.length < 100\n0 <= strs[i].length < 200\nstrs[i] contains any possible characters out of 256 valid ASCII characters." , n: "BRUTE FORCE:\n- Approach:\n- Time: O()\n- Space: O()\n\nBETTER:\n- Approach:\n- Time: O()\n- Space: O()\n\nOPTIMAL:\n- Approach:\n- Time: O()\n- Space: O()\n\nKEY INSIGHT:\n-"},
      { name: "Product of Array Except Self", d: "medium", q: "Given an integer array nums, return an array output where output[i] is the product of all the elements of nums except nums[i].\n\nEach product is guaranteed to fit in a 32-bit integer.\n\nFollow-up: Could you solve it in O(n) time without using the division operation?\n\nExample 1:\nInput: nums = [1,2,4,6]\nOutput: [48,24,12,8]\n\nExample 2:\nInput: nums = [-1,0,1,2,3]\nOutput: [0,-6,0,0,0]\n\nConstraints:\n2 <= nums.length <= 1000\n-20 <= nums[i] <= 20" , n: "BRUTE FORCE:\n- Approach:\n- Time: O()\n- Space: O()\n\nBETTER:\n- Approach:\n- Time: O()\n- Space: O()\n\nOPTIMAL:\n- Approach:\n- Time: O()\n- Space: O()\n\nKEY INSIGHT:\n-"},
      { name: "Valid Sudoku", d: "medium", q: "You are given a 9 x 9 Sudoku board. A Sudoku board is valid if the following rules are followed:\n\n1. Each row must contain the digits 1-9 without duplicates.\n2. Each column must contain the digits 1-9 without duplicates.\n3. Each of the nine 3 x 3 sub-boxes must contain the digits 1-9 without duplicates.\n\nReturn true if the Sudoku board is valid, otherwise return false.\n\nNote: A board does not need to be full or be solvable to be valid.\n\nConstraints:\nboard.length == 9\nboard[i].length == 9\nboard[i][j] is a digit 1-9 or '.'." , n: "BRUTE FORCE:\n- Approach:\n- Time: O()\n- Space: O()\n\nBETTER:\n- Approach:\n- Time: O()\n- Space: O()\n\nOPTIMAL:\n- Approach:\n- Time: O()\n- Space: O()\n\nKEY INSIGHT:\n-"},
      { name: "Longest Consecutive Sequence", d: "medium", q: "Given an array of integers nums, return the length of the longest consecutive sequence of elements that can be formed.\n\nA consecutive sequence is a sequence of elements in which each element is exactly 1 greater than the previous element. The elements do not have to be consecutive in the original array.\n\nYou must write an algorithm that runs in O(n) time.\n\nExample 1:\nInput: nums = [2,20,4,10,3,4,5]\nOutput: 4\nExplanation: The longest consecutive sequence is [2, 3, 4, 5].\n\nExample 2:\nInput: nums = [0,3,2,5,4,6,1,1]\nOutput: 7\n\nConstraints:\n0 <= nums.length <= 1000\n-10^9 <= nums[i] <= 10^9" , n: "BRUTE FORCE:\n- Approach:\n- Time: O()\n- Space: O()\n\nBETTER:\n- Approach:\n- Time: O()\n- Space: O()\n\nOPTIMAL:\n- Approach:\n- Time: O()\n- Space: O()\n\nKEY INSIGHT:\n-"}
    ]
  },
  {
    name: "Two Pointers", week: 2, problems: [
      { name: "Valid Palindrome", d: "easy" },
      { name: "Two Sum II", d: "medium" },

      { name: "Trapping Rain Water", d: "hard" }
    ]
  },

      { name: "Permutation in String", d: "medium" },
      { name: "Minimum Window Substring", d: "hard" },
      { name: "Sliding Window Maximum", d: "hard" }
    ]
  },
  {
    name: "Stack", week: 3, problems: [
      { name: "Valid Parentheses", d: "easy" },

      { name: "Evaluate Reverse Polish Notation", d: "medium" },
      { name: "Generate Parentheses", d: "medium" },
      { name: "Daily Temperatures", d: "medium" },

    ]
  },
  {
    name: "Binary Search", week: 4, problems: [
      { name: "Binary Search", d: "easy" },
      { name: "Search a 2D Matrix", d: "medium" },
      { name: "Koko Eating Bananas", d: "medium" },
      { name: "Find Minimum in Rotated Sorted Array", d: "medium" },

  {

    ]

  {

      { name: "Invert Binary Tree", d: "easy" },
      { name: "Maximum Depth of Binary Tree", d: "easy" },

      { name: "Balanced Binary Tree", d: "easy" },
      { name: "Same Tree", d: "easy" },
      { name: "Subtree of Another Tree", d: "easy" },
      { name: "Lowest Common Ancestor of BST", d: "medium" },

      { name: "Binary Tree Right Side View", d: "medium" },
      { name: "Count Good Nodes in Binary Tree", d: "medium" },
      { name: "Validate Binary Search Tree", d: "medium" },

      { name: "Serialize and Deserialize Binary Tree", d: "hard" }
    ]
  },
  {
    name: "Tries", week: 7, problems: [

      { name: "Design Add and Search Words Data Structure", d: "medium" },
      { name: "Word Search II", d: "hard" }
    ]
  },
  {

const STORAGE_KEY = "neetcode-tracker-v1";

function loadState() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
  catch(e) { return {}; }
}

function saveState(st) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(st));
}

function getKey(si, pi) { return si + "-" + pi; }
function getNoteKey(si, pi) { return "n-" + si + "-" + pi; }
function getQuestionKey(si, pi) { return "q-" + si + "-" + pi; }

function getCurrentWeek() {
  var start = new Date(2026, 2, 23);
  var now = new Date();
  var diff = Math.floor((now - start) / (7 * 24 * 60 * 60 * 1000));
  return Math.max(1, Math.min(14, diff + 1));
}

function getDaysRemaining() {
  var deadline = new Date(2026, 5, 30);
  var now = new Date();
  return Math.max(0, Math.ceil((deadline - now) / (1000 * 60 * 60 * 24)));
}

var state = loadState();
var currentFilter = "all";
var openSections = {};
var openNotes = {};

function autoResize(el) {
  el.style.height = "auto";
  el.style.height = el.scrollHeight + "px";
}

function escapeHtml(text) {
  var div = document.createElement("div");
  div.appendChild(document.createTextNode(text));
  return div.textContent;
}

var openQuestions = {};

function buildProblemItem(p, si, pi) {
  var key = getKey(si, pi);
  var noteKey = getNoteKey(si, pi);
  var questionKey = getQuestionKey(si, pi);
  var isChecked = key in state ? !!state[key] : !!p.s;
  var note = state[noteKey] || p.n || "";
  var question = state[questionKey] || p.q || "";

  var wrapper = document.createDocumentFragment();

  var item = document.createElement("div");
  item.className = "problem-item" + (isChecked ? " completed" : "");

  var checkbox = document.createElement("input");
  checkbox.type = "checkbox";
  checkbox.className = "problem-checkbox";
  checkbox.checked = isChecked;
  checkbox.addEventListener("change", function() {
    toggleProblem(si, pi, this.checked);
  });

  var nameSpan = document.createElement("span");
  nameSpan.className = "problem-name";
  nameSpan.textContent = p.name;
  nameSpan.addEventListener("click", function() { checkbox.click(); });

  var diffSpan = document.createElement("span");
  diffSpan.className = "problem-difficulty diff-" + p.d;
  diffSpan.textContent = p.d;

  var questionBtn = document.createElement("button");
  questionBtn.className = "question-btn" + (question ? " has-content" : "");
  questionBtn.textContent = "question";

  var notesBtn = document.createElement("button");
  notesBtn.className = "notes-btn";
  notesBtn.textContent = "notes";

  item.appendChild(checkbox);
  item.appendChild(nameSpan);
  item.appendChild(diffSpan);
  item.appendChild(questionBtn);
  item.appendChild(notesBtn);

  var noteId = si + "-" + pi;

  var questionArea = document.createElement("textarea");
  questionArea.className = "question-area" + (openQuestions[noteId] ? " visible" : "");
  questionArea.placeholder = "Paste the problem statement here...";
  questionArea.value = question;
  questionArea.addEventListener("input", function() { autoResize(this); });
  questionArea.addEventListener("blur", function() {
    var qKey = getQuestionKey(si, pi);
    if (this.value.trim()) {
      state[qKey] = this.value.trim();
    } else {
      delete state[qKey];
    }
    saveState(state);
  });

  questionBtn.addEventListener("click", function() {
    var wasVisible = openQuestions[noteId];
    // close all open areas
    document.querySelectorAll(".question-area.visible, .notes-area.visible").forEach(function(el) {
      el.classList.remove("visible");
    });
    openNotes = {};
    openQuestions = {};
    if (!wasVisible) {
      questionArea.classList.add("visible");
      openQuestions[noteId] = true;
      autoResize(questionArea);
      questionArea.focus();
    }
  });

  var textarea = document.createElement("textarea");
  textarea.className = "notes-area" + (openNotes[noteId] ? " visible" : "");
  textarea.placeholder = "Add notes...";
  textarea.value = note;
  textarea.addEventListener("input", function() { autoResize(this); });
  textarea.addEventListener("blur", function() {
    saveNote(si, pi, this.value);
  });

  notesBtn.addEventListener("click", function() {
    var wasVisible = openNotes[noteId];
    // close all open areas
    document.querySelectorAll(".notes-area.visible, .question-area.visible").forEach(function(el) {
      el.classList.remove("visible");
    });
    openNotes = {};
    openQuestions = {};
    if (!wasVisible) {
      textarea.classList.add("visible");
      openNotes[noteId] = true;
      autoResize(textarea);
      textarea.focus();
    }
  });

  wrapper.appendChild(item);
  wrapper.appendChild(questionArea);
  wrapper.appendChild(textarea);
  return wrapper;
}

function render() {
  var container = document.getElementById("sections-container");
  container.textContent = "";

  var totalDone = 0;
  var totalAll = 0;

  DATA.forEach(function(section, si) {
    var sectionDone = 0;
    section.problems.forEach(function(_, pi) {
      var k = getKey(si, pi); if (k in state ? state[k] : section.problems[pi].s) sectionDone++;
    });
    totalDone += sectionDone;
    totalAll += section.problems.length;

    var filteredProblems = [];
    section.problems.forEach(function(p, pi) {
      var dominated = false;
      var fk = getKey(si, pi); var fChecked = fk in state ? !!state[fk] : !!p.s; if (currentFilter === "pending" && fChecked) dominated = true;
      if (currentFilter === "completed" && !fChecked) dominated = true;
      if (currentFilter === "easy" && p.d !== "easy") dominated = true;
      if (currentFilter === "medium" && p.d !== "medium") dominated = true;
      if (currentFilter === "hard" && p.d !== "hard") dominated = true;
      if (!dominated) filteredProblems.push({ p: p, pi: pi });
    });

    if (filteredProblems.length === 0 && currentFilter !== "all") return;

    var pct = section.problems.length > 0 ? (sectionDone / section.problems.length * 100) : 0;
    var isComplete = sectionDone === section.problems.length;

    var div = document.createElement("div");
    div.className = "section" + (openSections[si] ? " open" : "");

    var header = document.createElement("div");
    header.className = "section-header";
    (function(idx) {
      header.addEventListener("click", function() {
        openSections[idx] = !openSections[idx];
        div.classList.toggle("open");
      });
    })(si);

    var titleDiv = document.createElement("div");
    titleDiv.className = "section-title";

    var chevron = document.createElement("span");
    chevron.className = "chevron";
    chevron.textContent = "\u25B6";

    var h3 = document.createElement("h3");
    h3.textContent = (isComplete ? "\u2713 " : "") + section.name;

    titleDiv.appendChild(chevron);
    titleDiv.appendChild(h3);

    var metaDiv = document.createElement("div");
    metaDiv.className = "section-meta";

    var countSpan = document.createElement("span");
    countSpan.className = "section-count";
    var doneSpan = document.createElement("span");
    doneSpan.className = "done-count";
    doneSpan.textContent = sectionDone;
    countSpan.appendChild(doneSpan);
    countSpan.appendChild(document.createTextNode(" / " + section.problems.length));

    var barDiv = document.createElement("div");
    barDiv.className = "section-bar";
    var barFill = document.createElement("div");
    barFill.className = "section-bar-fill";
    barFill.style.width = pct + "%";
    barDiv.appendChild(barFill);

    metaDiv.appendChild(countSpan);
    metaDiv.appendChild(barDiv);

    header.appendChild(titleDiv);
    header.appendChild(metaDiv);

    var listDiv = document.createElement("div");
    listDiv.className = "problem-list";

    filteredProblems.forEach(function(item) {
      listDiv.appendChild(buildProblemItem(item.p, si, item.pi));
    });

    div.appendChild(header);
    div.appendChild(listDiv);
    container.appendChild(div);
  });

  var remaining = totalAll - totalDone;
  var daysLeft = getDaysRemaining();
  var pace = daysLeft > 0 ? (remaining / daysLeft).toFixed(1) : "0";

  document.getElementById("stat-total").textContent = totalAll;
  document.getElementById("stat-done").textContent = totalDone;
  document.getElementById("stat-remaining").textContent = remaining;
  document.getElementById("stat-pace").textContent = remaining === 0 ? "Done!" : pace + "/day";

  var pctAll = totalAll > 0 ? (totalDone / totalAll * 100) : 0;
  document.getElementById("overall-pct").textContent = Math.round(pctAll) + "%";
  document.getElementById("overall-fill").style.width = pctAll + "%";

  renderWeekly();
}

function renderWeekly() {
  var container = document.getElementById("weekly-schedule");
  container.textContent = "";

  var heading = document.createElement("h2");
  heading.textContent = "Weekly Plan";
  container.appendChild(heading);

  var currentWk = getCurrentWeek();

  var weekProblems = {};
  DATA.forEach(function(section, si) {
    var wk = section.week;
    if (!weekProblems[wk]) weekProblems[wk] = { total: 0, done: 0 };
    weekProblems[wk].total += section.problems.length;
    section.problems.forEach(function(_, pi) {
      if (state[getKey(si, pi)]) weekProblems[wk].done++;
    });
  });

  WEEKS.forEach(function(w) {
    var wp = weekProblems[w.wk] || { total: 0, done: 0 };
    var isDone = wp.done === wp.total && wp.total > 0;

    var row = document.createElement("div");
    row.className = "week-row" + (w.wk === currentWk ? " current" : "");

    var wkSpan = document.createElement("span");
    wkSpan.className = "wk";
    wkSpan.textContent = "W" + w.wk;

    var secSpan = document.createElement("span");
    secSpan.className = "sections";
    secSpan.textContent = w.sections;

    var dateSpan = document.createElement("span");
    dateSpan.className = "dates";
    dateSpan.textContent = w.dates;

    var statusSpan = document.createElement("span");
    statusSpan.className = "wk-status";
    if (isDone) {
      statusSpan.classList.add("wk-done");
      statusSpan.textContent = "Done";
    } else if (w.wk <= currentWk) {
      statusSpan.classList.add("wk-active");
      statusSpan.textContent = wp.done + "/" + wp.total;
    } else {
      statusSpan.classList.add("wk-pending");
      statusSpan.textContent = wp.total + " items";
    }

    row.appendChild(wkSpan);
    row.appendChild(secSpan);
    row.appendChild(dateSpan);
    row.appendChild(statusSpan);
    container.appendChild(row);
  });
}

var NOTE_TEMPLATE =
  "BRUTE FORCE:\n" +
  "- Approach: \n" +
  "- Time: O()\n" +
  "- Space: O()\n" +
  "\n" +
  "BETTER:\n" +
  "- Approach: \n" +
  "- Time: O()\n" +
  "- Space: O()\n" +
  "\n" +
  "OPTIMAL:\n" +
  "- Approach: \n" +
  "- Time: O()\n" +
  "- Space: O()\n" +
  "\n" +
  "KEY INSIGHT:\n" +
  "- ";

function toggleProblem(si, pi, checked) {
  var key = getKey(si, pi);
  var noteKey = getNoteKey(si, pi);
  if (checked) {
    state[key] = true;
    if (!state[noteKey]) {
      state[noteKey] = NOTE_TEMPLATE;
    }
  } else {
    delete state[key];
  }
  saveState(state);
  render();
}

function saveNote(si, pi, value) {
  var key = getNoteKey(si, pi);
  if (value.trim()) {
    state[key] = value.trim();
  } else {
    delete state[key];
  }
  saveState(state);
}

document.getElementById("reset-btn").addEventListener("click", function() {
  if (confirm("Reset all progress? Notes will be preserved.")) {
    var preserved = {};
    Object.keys(state).forEach(function(k) {
      if (k.indexOf("n-") === 0) preserved[k] = state[k];
    });
    state = preserved;
    saveState(state);
    openSections = {};
    render();
  }
});

document.querySelectorAll(".filter-btn").forEach(function(btn) {
  btn.addEventListener("click", function() {
    document.querySelectorAll(".filter-btn").forEach(function(b) {
      b.classList.remove("active");
    });
    btn.classList.add("active");
    currentFilter = btn.dataset.filter;
    render();
  });
});

render();
